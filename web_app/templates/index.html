<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contextual ASL Translator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__content">
        <h1>Contextual ASL Translator</h1>
        <p>
          Convert English sentences into ASL gloss and explore HandSpeak references
          with a clean, accessible interface.
        </p>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <form id="translate-form" class="form" autocomplete="off">
          <label class="form__label" for="sentence-input">
            Enter a sentence to translate
          </label>
          <textarea
            id="sentence-input"
            name="sentence"
            placeholder="Example: I will eat an apple tomorrow."
            rows="3"
            required
          ></textarea>
          <button class="button" type="submit">Translate</button>
          <p id="form-error" class="form__error" role="alert" hidden></p>
        </form>
      </section>

      <section class="card" aria-live="polite">
        <h2 class="card__title">Results</h2>
        <div id="results" class="results results--placeholder">
          <p>Translations will appear here once you submit a sentence.</p>
        </div>
      </section>
    </main>

    <footer class="footer">
      <small>Built with ❤️ for learning and experimentation.</small>
    </footer>

    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
  </body>
</html>
