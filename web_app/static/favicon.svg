<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Project Castle">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Centered castle mark (filled shapes — crisp at 16–32px) -->
  <g fill="#ffffff">
    <rect x="6" y="20" width="20" height="3" rx="0.5"/>
    <rect x="8" y="12" width="4" height="8"/>
    <rect x="14" y="8" width="4" height="12"/>
    <rect x="20" y="12" width="4" height="8"/>
    <rect x="7" y="10" width="2" height="2"/>
    <rect x="9" y="10" width="2" height="2"/>
    <rect x="13" y="6" width="2" height="2"/>
    <rect x="15" y="6" width="2" height="2"/>
    <rect x="19" y="10" width="2" height="2"/>
    <rect x="21" y="10" width="2" height="2"/>
  </g>
</svg>
