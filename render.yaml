services:
  - type: web
    name: project-castle
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: |
      pip install -r requirements.txt
      python scripts/download_nlp_models.py || true
    startCommand: gunicorn web_app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: CASTLE_DATA_DIR
        value: /var/data
      - key: FLASK_SECRET_KEY
        generateValue: true
    disk:
      name: castle-data
      mountPath: /var/data
      sizeGB: 1

